<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Video Lens | 视频分析工作台</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="app-layout">
    <!-- 左侧控制台 -->
    <aside class="sidebar">
      <div class="brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
        <h1>Video Lens</h1>
      </div>
      
      <form id="analyze-form" class="controls">
        <!-- 运行环境状态 -->
        <div class="status-banner" id="provider-summary">
          <div class="pulse-dot"></div>
          <span>检查运行环境...</span>
        </div>

        <input id="scope" name="scope" type="hidden" value="single">
        <input id="provider" name="provider" type="hidden" value="ollama">

        <!-- 输入范围 -->
        <div class="control-group">
          <label class="group-label">任务模式</label>
          <div class="segmented" id="scope-switch">
            <button type="button" class="segment active" data-scope="single">单视频精查</button>
            <button type="button" class="segment" data-scope="folder">文件夹批量</button>
          </div>
        </div>

        <!-- 引擎选择 -->
        <div class="control-group">
          <label class="group-label">推理引擎</label>
          <div class="grid-2" id="provider-grid">
            <button type="button" class="engine-card active" data-provider="ollama">
              <span class="badge badge-local">LOCAL</span>
              <strong>Ollama</strong>
            </button>
            <button type="button" class="engine-card" data-provider="gemini">
              <span class="badge badge-cloud">CLOUD</span>
              <strong>Gemini</strong>
            </button>
          </div>
        </div>

        <!-- 素材上传 -->
        <div class="control-group">
          <label class="group-label">输入源 <span class="hint" id="selection-mode-note">单视频模式</span></label>
          
          <div id="single-drop" class="dropzone">
            <label>
              <input id="single-video-input" type="file" accept="video/*" hidden>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
              <span>选择单个视频文件</span>
            </label>
          </div>

          <div id="folder-drop" class="dropzone hidden">
            <label>
              <input id="folder-video-input" type="file" multiple webkitdirectory directory hidden>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg>
              <span>选择整个文件夹</span>
            </label>
          </div>

          <div id="selection-preview" class="selection-preview"></div>
        </div>

        <!-- 参数设置 (Ollama) -->
        <div id="ollama-fields" class="control-group config-panel">
          <label class="group-label">本地抽取参数</label>
          <div class="grid-2">
            <div class="input-wrap">
              <label>抽帧 FPS</label>
              <input id="fps" type="number" min="0.2" step="0.1" value="1">
            </div>
            <div class="input-wrap">
              <label>最大帧数</label>
              <input id="max_frames" type="number" min="4" step="1" value="24">
            </div>
          </div>
        </div>

        <!-- 参数设置 (Gemini) -->
        <div id="gemini-fields" class="control-group config-panel hidden">
          <label class="group-label">Gemini 凭证</label>
          <div class="input-wrap mb-2">
            <label>API Key</label>
            <input id="gemini_api_key" type="password" placeholder="AIza...">
          </div>
          <div class="input-wrap">
            <label>Model</label>
            <input id="gemini_model" type="text" value="gemini-2.5-pro">
          </div>
        </div>

        <!-- 自定义 Prompt -->
        <div class="control-group">
          <label class="group-label">自定义指令 (Prompt)</label>
          <textarea id="prompt" rows="4" placeholder="补充你的分析要求，例如：重点关注人物的异常举动..."></textarea>
        </div>

        <div class="actions">
          <button id="submit-button" class="btn-primary" type="submit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            <span id="submit-text">开始分析</span>
          </button>
        </div>
      </form>
    </aside>

    <!-- 右侧主体内容 -->
    <main class="main-content">
      
      <!-- 上半部分：任务总览与队列 -->
      <section class="panel queue-section">
        <header class="panel-header">
          <div class="header-title">
            <h2>任务监控台</h2>
            <div id="meta-chips" class="chips-container"></div>
          </div>
          <div class="progress-container">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
        </header>

        <div class="queue-layout">
          <!-- 总体统计与日志 -->
          <div class="overview-pane">
            <div id="batch-summary" class="stats-grid"></div>
            <div class="log-container">
              <pre id="status-log">系统尚未开始处理。请在左侧配置任务并启动。</pre>
            </div>
          </div>

          <!-- 队列列表 -->
          <div class="list-pane">
            <h3 class="pane-title">执行队列 <span id="queue-subtitle"></span></h3>
            <div id="item-list" class="queue-list">
              <div class="empty-state">队列为空</div>
            </div>
          </div>
        </div>
      </section>

      <!-- 下半部分：单条详情 -->
      <section class="panel detail-section">
        <header class="panel-header detail-header">
          <div>
            <h2>详情结果</h2>
            <p id="result-subtitle" class="subtitle">暂无选中内容</p>
          </div>
          <button id="copy-current" class="btn-secondary" type="button" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
            复制结果
          </button>
        </header>

        <div class="detail-layout">
          <div id="result-metrics" class="metrics-sidebar">
            <!-- 动态填充的 Metric Card -->
          </div>
          <div class="analysis-content">
            <article id="result-analysis" class="markdown-body empty">
              选择左侧任务队列中的条目，以查看其多模态分析结果。
            </article>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
